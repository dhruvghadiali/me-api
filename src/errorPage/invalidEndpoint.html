<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invalid Endpoint</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="bg-white p-6 rounded-lg shadow-lg text-center max-w-md">
      <h1 class="text-2xl font-bold text-red-600">Invalid Endpoint</h1>
      <p class="text-gray-700 mt-2">
        The requested endpoint does not exist. Please check the URL and try
        again.
      </p>
      <a
        href="/"
        class="mt-4 inline-block px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
        >Go Home</a
      >
    </div>
  </body>
</html>
